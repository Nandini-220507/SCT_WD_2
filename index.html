<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neo Calculator</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
        linear-gradient(135deg,#0f172a,#1e1b4b,#312e81,#0f172a);
    overflow:hidden;
    position:relative;
}

/* Floating Background Circles */
body::before,
body::after{
    content:"";
    position:absolute;
    border-radius:50%;
    filter:blur(80px);
    z-index:-1;
}

body::before{
    width:300px;
    height:300px;
    background:#00f7ff;
    top:-80px;
    left:-80px;
}

body::after{
    width:350px;
    height:350px;
    background:#8b5cf6;
    bottom:-100px;
    right:-100px;
}

.calculator{
    width:380px;
    padding:30px;
    border-radius:35px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(25px);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:
        0 20px 50px rgba(0,0,0,0.5),
        0 0 30px rgba(0,247,255,0.15);
    animation:float 4s ease-in-out infinite;
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-10px);
    }
}

.calculator h2{
    text-align:center;
    color:#fff;
    margin-bottom:20px;
    font-weight:600;
    letter-spacing:2px;
}

#display{
    width:100%;
    height:85px;
    border:none;
    outline:none;
    border-radius:22px;
    background:rgba(255,255,255,0.12);
    color:#fff;
    text-align:right;
    padding:20px;
    font-size:2.2rem;
    margin-bottom:25px;
    box-shadow:inset 0 0 10px rgba(255,255,255,0.1);
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
}

button{
    height:70px;
    width:70px;
    border:none;
    border-radius:50%;
    font-size:1.3rem;
    font-weight:500;
    cursor:pointer;
    color:#fff;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    transition:all 0.3s ease;
    box-shadow:
        0 5px 15px rgba(0,0,0,0.3),
        inset 0 1px 2px rgba(255,255,255,0.1);
}

button:hover{
    transform:translateY(-6px) scale(1.08);
    background:rgba(255,255,255,0.18);
    box-shadow:0 0 20px rgba(255,255,255,0.2);
}

button:active{
    transform:scale(0.95);
}

.operator{
    background:linear-gradient(135deg,#8b5cf6,#6366f1);
    box-shadow:0 0 20px rgba(99,102,241,0.5);
}

.operator:hover{
    box-shadow:0 0 30px rgba(99,102,241,0.8);
}

.equal{
    width:155px;
    border-radius:40px;
    grid-column:span 2;
    background:linear-gradient(135deg,#00f7ff,#06b6d4);
    box-shadow:0 0 25px rgba(0,247,255,0.5);
}

.equal:hover{
    box-shadow:0 0 35px rgba(0,247,255,0.8);
}

@media(max-width:420px){
    .calculator{
        width:95%;
        padding:20px;
    }

    button{
        width:60px;
        height:60px;
    }

    .equal{
        width:135px;
    }
}
</style>

</head>
<body>

<div class="container">
    <div class="calculator">
        <input type="text" id="display" readonly>

        <div class="buttons">
            <button class="operator">C</button>
            <button class="operator">⌫</button>
            <button class="operator">%</button>
            <button class="operator">/</button>

            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="operator">*</button>

            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="operator">-</button>

            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="operator">+</button>

            <button>0</button>
            <button>.</button>
            <button class="equal">=</button>
        </div>
    </div>
</div>

<script>
const display = document.getElementById("display");
const buttons = document.querySelectorAll("button");

buttons.forEach(button => {
    button.addEventListener("click", () => {
        const value = button.innerText;

        if (value === "C") {
            display.value = "";
        }
        else if (value === "⌫") {
            display.value = display.value.slice(0, -1);
        }
        else if (value === "=") {
            calculate();
        }
        else {
            display.value += value;
        }
    });
});

function calculate() {
    try {
        if (display.value === "") return;

        let result = eval(display.value);
        display.value = result;
    }
    catch {
        display.value = "Error";
        setTimeout(() => {
            display.value = "";
        }, 1000);
    }
}

// Keyboard Support
document.addEventListener("keydown", (e) => {
    const key = e.key;

    if (
        (key >= "0" && key <= "9") ||
        key === "+" ||
        key === "-" ||
        key === "*" ||
        key === "/" ||
        key === "." ||
        key === "%"
    ) {
        display.value += key;
    }

    else if (key === "Enter") {
        calculate();
    }

    else if (key === "Backspace") {
        display.value = display.value.slice(0, -1);
    }

    else if (key === "Escape") {
        display.value = "";
    }
});
</script>

</body>
</html>
